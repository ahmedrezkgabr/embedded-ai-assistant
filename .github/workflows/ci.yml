name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage=false

  integration:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ffmpeg libespeak-ng1 wget curl python3

      - name: Build llama.cpp
        run: |
          if [ ! -d llm/llama.cpp/.git ]; then
            rm -rf llm/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llm/llama.cpp
          fi
          cmake -S llm/llama.cpp -B llm/llama.cpp/build -DLLAMA_BUILD_SERVER=ON -DLLAMA_NATIVE=OFF
          cmake --build llm/llama.cpp/build --config Release -j"$(nproc)"
          test -x llm/llama.cpp/build/bin/llama-server

      - name: Build whisper.cpp
        run: |
          if [ ! -d stt/whisper.cpp/.git ]; then
            rm -rf stt/whisper.cpp
            git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git stt/whisper.cpp
          fi
          cmake -S stt/whisper.cpp -B stt/whisper.cpp/build
          cmake --build stt/whisper.cpp/build -j"$(nproc)"
          test -x stt/whisper.cpp/build/bin/whisper-cli

      - name: Ensure piper runtime
        run: |
          mkdir -p tts/bin

          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64)
              PIPER_URL="https://github.com/rhasspy/piper/releases/latest/download/piper_linux_x86_64.tar.gz"
              ;;
            aarch64)
              PIPER_URL="https://github.com/rhasspy/piper/releases/latest/download/piper_linux_aarch64.tar.gz"
              ;;
            *)
              echo "Unsupported architecture for piper: $ARCH"
              exit 1
              ;;
          esac

          wget -q -O /tmp/piper_release.tar.gz "$PIPER_URL"
          rm -rf /tmp/piper_extract
          mkdir -p /tmp/piper_extract
          tar -xzf /tmp/piper_release.tar.gz -C /tmp/piper_extract

          PIPER_FOUND="$(find /tmp/piper_extract -type f -name piper | head -n 1 || true)"
          [ -n "$PIPER_FOUND" ] || (echo "piper binary not found in archive" && exit 1)

          cp -a "$(dirname "$PIPER_FOUND")"/. tts/bin/

          chmod +x tts/bin/piper
          test -x tts/bin/piper
          file tts/bin/piper

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            llm/models
            stt/models
            tts/models
          key: ai-models-Qwen2.5-0.5B-Instruct-Q4_K_M.gguf-ggml-tiny.en.bin-en_US-lessac-low.onnx-v1

      - name: Download models when missing
        run: |
          mkdir -p llm/models stt/models tts/models

          if [ ! -f llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf ]; then
            wget -q -O llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
              "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
          fi

          if [ ! -f stt/models/ggml-tiny.en.bin ]; then
            wget -q -O stt/models/ggml-tiny.en.bin \
              "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"
          fi

          if [ ! -f tts/models/en_US-lessac-low.onnx ]; then
            wget -q -O tts/models/en_US-lessac-low.onnx \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx"
          fi

          if [ ! -f tts/models/en_US-lessac-low.onnx.json ]; then
            wget -q -O tts/models/en_US-lessac-low.onnx.json \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx.json"
          fi

      - name: Write backend/.env
        run: |
          REPO_ROOT="$PWD"
          cat > backend/.env <<EOF
          PORT=3000
          TMP_DIR=/tmp
          UPLOAD_DIR=/tmp/ai-assistant/uploads
          LOG_FILE=/tmp/ai-assistant/backend.log
          LLM_BASE_URL=http://127.0.0.1:11434
          LLM_DEFAULT_MODEL=Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          LLM_TIMEOUT=60000
          LLM_MAX_TOKENS=128
          LLM_TEMPERATURE=0
          LLM_TOP_P=0.2
          LLM_FREQUENCY_PENALTY=0
          LLM_PRESENCE_PENALTY=0
          LLM_STRICT_SYSTEM_PROMPT=You are an embedded Linux voice assistant running offline. Always reply in English only using ASCII characters. Keep answers concise and factual.
          WHISPER_BIN=$REPO_ROOT/stt/whisper.cpp/build/bin/whisper-cli
          WHISPER_MODEL=$REPO_ROOT/stt/models/ggml-tiny.en.bin
          WHISPER_TIMEOUT=30000
          PIPER_BIN=$REPO_ROOT/tts/bin/piper
          PIPER_VOICE=$REPO_ROOT/tts/models/en_US-lessac-low.onnx
          PIPER_VOICE_DIR=$REPO_ROOT/tts/models
          PIPER_ESPEAK_DATA=$REPO_ROOT/tts/bin/espeak-ng-data
          LD_LIBRARY_PATH=$REPO_ROOT/tts/bin
          PIPER_TIMEOUT=20000
          NODE_ENV=test
          EOF
          sed -i 's/^[[:space:]]*//' backend/.env
          ! grep -q '\$PWD' backend/.env

      - name: Start llama-server
        run: |
          llm/llama.cpp/build/bin/llama-server \
            -m llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
            --host 0.0.0.0 --port 11434 -c 2048 --threads 2 -ngl 0 \
            --chat-template qwen2 > /tmp/llama.log 2>&1 &

          for i in $(seq 1 24); do
            if curl -sf http://127.0.0.1:11434/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "llama-server failed to start"
          cat /tmp/llama.log
          exit 1

      - name: Start backend
        run: |
          cd backend
          npm ci
          node src/server.js > /tmp/backend.log 2>&1 &
          cd ..

          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3000/api/llm/health | python3 -c "import json,sys; print('ok' if json.load(sys.stdin).get('status')=='ok' else 'bad')" | grep -q ok; then
              exit 0
            fi
            sleep 2
          done

          echo "backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: API integration checks
        run: |
          LLM_RESPONSE=$(curl -sf -X POST http://127.0.0.1:3000/api/llm/chat \
            -H "Content-Type: application/json" \
            -d '{"prompt":"What is 1 plus 1? Reply with just the number.","options":{"temperature":0,"max_tokens":8,"seed":42}}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('response',''))")

          [ -n "$LLM_RESPONSE" ] || (echo "empty llm response" && exit 1)
          python3 -c "import sys; text=sys.argv[1]; (print('non-ascii output: ' + text), sys.exit(1)) if any(ord(c) >= 128 for c in text) else print('ascii output ok: ' + text)" "$LLM_RESPONSE"

          TTS_HTTP=$(curl -s -o /tmp/ci_tts.wav -w "%{http_code}" -X POST http://127.0.0.1:3000/api/voice/tts \
            -H "Content-Type: application/json" \
            -d '{"text":"CI audio test."}')
          [ "$TTS_HTTP" = "200" ] || (echo "tts failed" && cat /tmp/ci_tts.wav && exit 1)
          [ "$(wc -c < /tmp/ci_tts.wav)" -gt 5000 ] || (echo "tts output too small" && exit 1)

          ffmpeg -f lavfi -i "sine=frequency=440:duration=2" -ar 16000 -ac 1 -sample_fmt s16 /tmp/ci_stt.wav -y -loglevel quiet
          STT_HTTP=$(curl -s -o /tmp/ci_stt.json -w "%{http_code}" -X POST http://127.0.0.1:3000/api/voice/stt -F "audio=@/tmp/ci_stt.wav;type=audio/wav")
          [ "$STT_HTTP" = "200" ] || (echo "stt failed" && cat /tmp/ci_stt.json && exit 1)
          python3 -c "import json; data=json.load(open('/tmp/ci_stt.json')); assert 'transcript' in data; print('stt transcript present')"

          curl -sN -X POST http://127.0.0.1:3000/api/llm/stream \
            -H 'Content-Type: application/json' \
            -d '{"prompt":"Say hi"}' > /tmp/sse.out
          grep -q '^data: ' /tmp/sse.out || (echo "sse stream missing data lines" && exit 1)
          grep -q '"done":true' /tmp/sse.out || (echo "sse stream missing done event" && exit 1)
          echo "sse streaming ok"

          for path in / /style.css /app.js; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3000$path")
            [ "$code" = "200" ] || (echo "static file check failed: $path" && exit 1)
          done

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== llama.log ==="
          cat /tmp/llama.log || true
          echo "=== backend.log ==="
          cat /tmp/backend.log || true

  yocto-qemu-image:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Yocto host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential chrpath socat cpio \
            python3 python3-pip python3-pexpect xz-utils debianutils iputils-ping \
            python3-git python3-jinja2 python3-subunit zstd liblz4-tool file locales
          sudo locale-gen en_US.UTF-8

      - name: Enable unprivileged user namespaces for BitBake
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sysctl kernel.apparmor_restrict_unprivileged_userns

      - name: Prepare backend dependencies for Yocto packaging
        run: |
          cd backend
          npm ci --omit=dev

      - name: Ensure required local models exist
        run: |
          mkdir -p llm/models stt/models tts/models

          if [ ! -f llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf ]; then
            wget -q -O llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
              "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
          fi

          if [ ! -f stt/models/ggml-tiny.en.bin ]; then
            wget -q -O stt/models/ggml-tiny.en.bin \
              "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"
          fi

          if [ ! -f tts/models/en_US-lessac-low.onnx ]; then
            wget -q -O tts/models/en_US-lessac-low.onnx \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx"
          fi

          if [ ! -f tts/models/en_US-lessac-low.onnx.json ]; then
            wget -q -O tts/models/en_US-lessac-low.onnx.json \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx.json"
          fi

      - name: Configure Yocto layers and build config
        run: |
          bash yocto/setup.sh
          source yocto/poky/oe-init-build-env yocto/build
          cp "$GITHUB_WORKSPACE/yocto/conf/local.conf.sample" conf/local.conf
          cp "$GITHUB_WORKSPACE/yocto/conf/bblayers.conf.sample" conf/bblayers.conf
          bitbake-layers show-layers

      - name: Build QEMU image
        run: |
          source yocto/poky/oe-init-build-env yocto/build
          bitbake ai-assistant-image

      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        with:
          name: yocto-qemu-image
          path: |
            yocto/build/tmp/deploy/images/qemux86-64/ai-assistant-image-qemux86-64.rootfs.*
            yocto/build/tmp/deploy/images/qemux86-64/ai-assistant-image-qemux86-64.*
          if-no-files-found: error

