name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm test

  build-llm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: llm/llama.cpp/build
          key: llama-cpp-${{ hashFiles('llm/setup.sh') }}-ubuntu
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Build llama.cpp
        run: |
          if [ ! -f llm/llama.cpp/build/bin/llama-server ]; then
            cd llm && bash setup.sh --build-only
          fi
      - name: Cache llama-server binary
        uses: actions/upload-artifact@v4
        with:
          name: llama-server
          path: |
            llm/llama.cpp/build/bin/llama-server
            llm/llama.cpp/build/bin/*.so*

  build-stt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache whisper.cpp build
        uses: actions/cache@v4
        with:
          path: stt/whisper.cpp/build
          key: whisper-cpp-${{ hashFiles('stt/setup.sh') }}-ubuntu
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Build whisper.cpp
        run: |
          if [ ! -f stt/whisper.cpp/build/bin/whisper-cli ]; then
            cd stt && bash setup.sh --build-only
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: whisper-cli
          path: stt/whisper.cpp/build/bin/whisper-cli

  build-tts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libespeak-ng-dev git
      - name: Cache piper build
        uses: actions/cache@v4
        with:
          path: |
            tts/bin
            tts/piper-src/build
          key: piper-${{ hashFiles('tts/setup.sh') }}-ubuntu
      - name: Build piper
        run: |
          if [ ! -f tts/bin/piper ]; then
            cd tts && bash setup.sh --build-only
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: piper
          path: tts/bin/piper

  integration:
    runs-on: ubuntu-latest
    needs: [unit-test, build-llm, build-stt, build-tts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: llama-server
          path: llm/llama.cpp/build/bin
      - uses: actions/download-artifact@v4
        with:
          name: whisper-cli
          path: stt/whisper.cpp/build/bin
      - uses: actions/download-artifact@v4
        with:
          name: piper
          path: tts/bin
      - run: chmod +x llm/llama.cpp/build/bin/llama-server stt/whisper.cpp/build/bin/whisper-cli tts/bin/piper

      - name: Cache model files
        uses: actions/cache@v4
        with:
          path: |
            llm/models
            stt/models
            tts/models
          key: ai-models-v1

      - name: Download models if not cached
        run: |
          mkdir -p llm/models stt/models tts/models

          if [ ! -f llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf ]; then
            wget -q -O llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
              "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
          fi

          if [ ! -f stt/models/ggml-tiny.en.bin ]; then
            wget -q -O stt/models/ggml-tiny.en.bin \
              "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"
          fi

          if [ ! -f tts/models/en_US-lessac-low.onnx ]; then
            wget -q -O tts/models/en_US-lessac-low.onnx \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx"
            wget -q -O tts/models/en_US-lessac-low.onnx.json \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/low/en_US-lessac-low.onnx.json"
          fi

      - name: Write .env for CI
        run: |
          cat > backend/.env << 'EOF'
          PORT=3000
          LLM_BASE_URL=http://localhost:11434
          LLM_DEFAULT_MODEL=Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          LLM_TEMPERATURE=0
          LLM_TOP_P=0.2
          LLM_FREQUENCY_PENALTY=0
          LLM_PRESENCE_PENALTY=0
          LLM_MAX_TOKENS=64
          LLM_STRICT_SYSTEM_PROMPT=You are an embedded Linux voice assistant running offline. Always reply in English only using ASCII characters. Never output Chinese, Japanese, Korean, or other non-English scripts. Keep answers short and production-safe.
          WHISPER_BIN=../stt/whisper.cpp/build/bin/whisper-cli
          WHISPER_MODEL=../stt/models/ggml-tiny.en.bin
          PIPER_BIN=../tts/bin/piper
          PIPER_VOICE=../tts/models/en_US-lessac-low.onnx
          NODE_ENV=test
          LLM_TIMEOUT=60000
          EOF

      - name: Start llama-server
        run: |
          export LD_LIBRARY_PATH="$PWD/llm/llama.cpp/build/bin:${LD_LIBRARY_PATH:-}"

          llm/llama.cpp/build/bin/llama-server \
            -m llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
            --host 0.0.0.0 --port 11434 \
            -c 2048 --threads 2 -ngl 0 \
            --chat-template qwen2 \
            > /tmp/llama.log 2>&1 &

          READY=0
          echo "Waiting for llama-server..."
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:11434/health >/dev/null || curl -sf http://localhost:11434/v1/models >/dev/null; then
              READY=1
              echo "Ready"
              break
            fi
            echo "  still waiting ($((i*5))s)..."
          done

          [ "$READY" = "1" ] || (echo "llama-server failed to become ready" && cat /tmp/llama.log && exit 1)

      - name: Install backend deps and start Express
        run: |
          cd backend && npm ci
          node src/server.js > /tmp/backend.log 2>&1 &

          READY=0
          for i in $(seq 1 20); do
            sleep 2
            STATUS=$(curl -sf http://localhost:3000/api/llm/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" || true)
            if [ "$STATUS" = "ok" ]; then
              READY=1
              break
            fi
          done
          [ "$READY" = "1" ] || (echo "Backend LLM health not ready" && cat /tmp/backend.log && cat /tmp/llama.log && exit 1)

      - name: API tests
        run: |
          STATUS=$(curl -sf http://localhost:3000/api/llm/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          [ "$STATUS" = "ok" ] || (echo "LLM health FAILED: $STATUS" && exit 1)

          CHAT_OK=0
          LAST_RESP=""
          for attempt in $(seq 1 3); do
            RESP=$(curl -sf -X POST http://localhost:3000/api/llm/chat \
              -H "Content-Type: application/json" \
              -d '{"prompt":"Reply with only the word PONG","options":{"temperature":0,"top_p":0.1,"max_tokens":4,"frequency_penalty":0,"presence_penalty":0,"system_prompt":"Output exactly this uppercase ASCII token and nothing else: PONG"}}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('response',''))")
            CLEAN_RESP=$(echo "$RESP" | tr -d '\r' | xargs)
            LAST_RESP="$CLEAN_RESP"

            if [ -n "$CLEAN_RESP" ] \
              && echo "$CLEAN_RESP" | grep -Eq '^[ -~]+$' \
              && echo "$CLEAN_RESP" | grep -Eq '(^|[^A-Za-z])PONG([^A-Za-z]|$)'; then
              CHAT_OK=1
              break
            fi

            echo "LLM chat probe attempt $attempt did not pass strict token check: '$CLEAN_RESP'"
            sleep 1
          done

          [ "$CHAT_OK" = "1" ] || (echo "LLM chat returned unexpected response after retries: $LAST_RESP" && exit 1)
          echo "LLM chat OK: $LAST_RESP"

          STT_OK=$(curl -sf http://localhost:3000/api/voice/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['stt']['ok'])")
          TTS_OK=$(curl -sf http://localhost:3000/api/voice/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tts']['ok'])")
          [ "$STT_OK" = "True" ] || (echo "STT health FAILED" && exit 1)
          [ "$TTS_OK" = "True" ] || (echo "TTS health FAILED" && exit 1)

          curl -sf -X POST http://localhost:3000/api/voice/tts \
            -H "Content-Type: application/json" \
            -d '{"text":"Continuous integration test."}' \
            --output /tmp/ci_tts.wav
          SIZE=$(wc -c < /tmp/ci_tts.wav)
          [ "$SIZE" -gt 5000 ] || (echo "TTS output too small: $SIZE bytes" && exit 1)
          echo "TTS OK: $SIZE bytes"

          sudo apt-get install -y ffmpeg -q
          ffmpeg -f lavfi -i "sine=frequency=440:duration=2" \
            -ar 16000 -ac 1 -sample_fmt s16 /tmp/ci_stt.wav -y -loglevel quiet
          TRANSCRIPT=$(curl -sf -X POST http://localhost:3000/api/voice/stt \
            -F "audio=@/tmp/ci_stt.wav;type=audio/wav" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('transcript',''))")
          echo "STT OK: transcript='$TRANSCRIPT'"

          for path in "/" "/style.css" "/app.js"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000$path")
            [ "$CODE" = "200" ] || (echo "Static $path returned $CODE" && exit 1)
          done
          echo "Static files OK"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== llama.log ===" && cat /tmp/llama.log || true
          echo "=== backend.log ===" && cat /tmp/backend.log || true

  e2e-voice:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: llama-server
          path: llm/llama.cpp/build/bin
      - uses: actions/download-artifact@v4
        with:
          name: whisper-cli
          path: stt/whisper.cpp/build/bin
      - uses: actions/download-artifact@v4
        with:
          name: piper
          path: tts/bin
      - run: chmod +x llm/llama.cpp/build/bin/llama-server stt/whisper.cpp/build/bin/whisper-cli tts/bin/piper

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: |
            llm/models
            stt/models
            tts/models
          key: ai-models-v1

      - name: Write .env, start services
        run: |
          cat > backend/.env << 'EOF'
          PORT=3000
          LLM_BASE_URL=http://localhost:11434
          LLM_DEFAULT_MODEL=Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
          LLM_TEMPERATURE=0
          LLM_TOP_P=0.2
          LLM_FREQUENCY_PENALTY=0
          LLM_PRESENCE_PENALTY=0
          LLM_MAX_TOKENS=128
          LLM_STRICT_SYSTEM_PROMPT=You are an embedded Linux voice assistant running offline. Always reply in English only using ASCII characters. Never output Chinese, Japanese, Korean, or other non-English scripts. Keep answers short and production-safe.
          WHISPER_BIN=../stt/whisper.cpp/build/bin/whisper-cli
          WHISPER_MODEL=../stt/models/ggml-tiny.en.bin
          PIPER_BIN=../tts/bin/piper
          PIPER_VOICE=../tts/models/en_US-lessac-low.onnx
          NODE_ENV=test
          LLM_TIMEOUT=60000
          EOF
          export LD_LIBRARY_PATH="$PWD/llm/llama.cpp/build/bin:${LD_LIBRARY_PATH:-}"

          llm/llama.cpp/build/bin/llama-server \
            -m llm/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf \
            --host 0.0.0.0 --port 11434 -c 2048 --threads 2 -ngl 0 \
            --chat-template qwen2 > /tmp/llama.log 2>&1 &

          READY=0
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:11434/health >/dev/null || curl -sf http://localhost:11434/v1/models >/dev/null; then
              READY=1
              break
            fi
          done
          [ "$READY" = "1" ] || (echo "llama-server failed to become ready" && cat /tmp/llama.log && exit 1)

          cd backend && npm ci && node src/server.js > /tmp/backend.log 2>&1 &

          READY=0
          for i in $(seq 1 20); do
            sleep 2
            STATUS=$(curl -sf http://localhost:3000/api/llm/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" || true)
            if [ "$STATUS" = "ok" ]; then
              READY=1
              break
            fi
          done
          [ "$READY" = "1" ] || (echo "Backend LLM health not ready" && cat /tmp/backend.log && cat /tmp/llama.log && exit 1)

      - name: Full voice round-trip
        run: |
          sudo apt-get install -y ffmpeg -q

          curl -sf -X POST http://localhost:3000/api/voice/tts \
            -H "Content-Type: application/json" \
            -d '{"text":"What is the largest planet in the solar system?"}' \
            --output /tmp/e2e_question.wav
          [ $(wc -c < /tmp/e2e_question.wav) -gt 5000 ] || (echo "TTS failed" && exit 1)

          ffmpeg -i /tmp/e2e_question.wav \
            -ar 16000 -ac 1 -sample_fmt s16 /tmp/e2e_16k.wav -y -loglevel quiet

          TRANSCRIPT=$(curl -sf -X POST http://localhost:3000/api/voice/stt \
            -F "audio=@/tmp/e2e_16k.wav;type=audio/wav" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('transcript',''))")
          echo "Transcript: $TRANSCRIPT"
          [ -n "$TRANSCRIPT" ] || (echo "Empty transcript" && exit 1)

          REPLY=$(curl -sf -X POST http://localhost:3000/api/llm/chat \
            -H "Content-Type: application/json" \
            -d "{\"prompt\":\"$TRANSCRIPT\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('response',''))")
          echo "Reply: $REPLY"
          [ -n "$REPLY" ] || (echo "Empty LLM reply" && exit 1)

          REPLY_SAFE=$(echo "$REPLY" | head -c 200 | tr '"' "'")
          curl -sf -X POST http://localhost:3000/api/voice/tts \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$REPLY_SAFE\"}" \
            --output /tmp/e2e_reply.wav
          SIZE=$(wc -c < /tmp/e2e_reply.wav)
          [ "$SIZE" -gt 5000 ] || (echo "Reply TTS too small: $SIZE" && exit 1)
          echo "E2E voice round-trip PASSED. Reply WAV: $SIZE bytes"

      - name: Show logs on failure
        if: failure()
        run: |
          cat /tmp/llama.log || true
          cat /tmp/backend.log || true
